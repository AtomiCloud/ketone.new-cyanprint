username: cyan
name: new
description: CyanPrint Template to create CyanPrint Templates, Processors, Plugins or Resolvers
project: https://github.com/AtomiCloud/ketone.new-cyanprint
source: https://github.com/AtomiCloud/ketone.new-cyanprint
email: ernest@atomi.cloud
tags:
  - default
  - cyanprint
readme: README.MD
build:
  registry: ${DOMAIN}/${GITHUB_REPO_REF}
  platforms:
    - linux/amd64
    - linux/arm64
  images:
    template:
      image: template-template
      dockerfile: ./cyan/Dockerfile
      context: ./cyan
    blob:
      image: template-blob
      dockerfile: ./cyan/blob.Dockerfile
      context: ./cyan
templates: []
processors:
  - cyan/default
plugins: []
