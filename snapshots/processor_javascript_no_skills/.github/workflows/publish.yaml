name: CI-CD

on:
  push:

jobs:
  test:
    name: Test
    permissions:
      contents: read
    runs-on:
      - nscloud-ubuntu-22.04-amd64-4x8-with-cache
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-${{ github.repository_owner }}-${{ github.event.repository.name }}-test-nix-store-cache
    steps:
      - uses: actions/checkout@v4
      - uses: AtomiCloud/actions.setup-nix@v2
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Run CyanPrint Tests
        run: nix develop .#ci -c cyanprint test processor . --parallel 1
  publish:
    needs: test
    if: github.ref == 'refs/heads/main'
    name: Publish
    permissions:
      contents: read
      id-token: write
      packages: write
    runs-on:
      - nscloud-ubuntu-22.04-amd64-4x8-with-cache
      - nscloud-cache-size-50gb
      - nscloud-cache-tag-${{ github.repository_owner }}-${{ github.event.repository.name }}-nix-store-cache
    steps:
      - uses: actions/checkout@v4
      - uses: AtomiCloud/actions.setup-nix@v2
      - uses: rlespinasse/github-slug-action@v3.x
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish CyanPrint
        env:
          DOMAIN: ghcr.io
          GITHUB_REPO_REF: ${{ github.repository }}
          DOCKER_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
          DOCKER_USER: ${{ github.actor }}
          CYAN_TOKEN: ${{ secrets.CYAN_TOKEN }}
          IMAGE_VERSION: ${{ github.sha }}-${{ env.GITHUB_REF_SLUG }}
        run: nix develop .#ci -c ./scripts/publish.sh
