username: testuser
name: test-template
description: A test template
project: https://github.com/test/test
source: https://github.com/test/test
email: test@example.com
tags: []
readme: cyan/README.MD
templates: []
processors:
  - cyan/default
plugins: []
resolvers: []
commands:
  - 'chmod +x scripts/*.sh 2>/dev/null || true'
build:
  registry: ${DOMAIN:-docker.io}/${GITHUB_REPO_REF:-testuser}
  platforms:
    - linux/amd64
    - linux/arm64
  images:
    template:
      image: test-template
      dockerfile: cyan/Dockerfile
      context: ./cyan
    blob:
      image: 'test-template-blob'
      dockerfile: cyan/blob.Dockerfile
      context: .
