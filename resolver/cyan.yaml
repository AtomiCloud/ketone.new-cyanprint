username: {{username }}
name: {{name }}
description: {{desc }}
project: {{project }}
source: {{source }}
email: {{email }}
tags: {{tags }}
readme: README.MD
build:
  registry: ${DOMAIN:-docker.io}/${GITHUB_REPO_REF:-{{username }}}
  platforms:
    - linux/amd64
    - linux/arm64
  images:
    resolver:
      image: {{name }}
      dockerfile: Dockerfile
      context: .
