username: { { username } }
name: { { name } }
description: { { desc } }
project: { { project } }
source: { { source } }
email: { { email } }
tags: { { tags } }
readme: cyan/README.MD
templates: []
processors: []
plugins: []
resolvers: []
build:
  registry: ${DOMAIN}/${GITHUB_REPO_REF}
  platforms:
    - linux/amd64
    - linux/arm64
  images:
    template:
      image: template-script
      dockerfile: cyan/Dockerfile
      context: ./cyan
    blob:
      image: template-blob
      dockerfile: cyan/blob.Dockerfile
      context: .
